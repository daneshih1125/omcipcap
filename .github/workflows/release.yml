name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: omcipcap_linux
            asset_name: omcipcap-linux-amd64
          - os: windows-latest
            artifact_name: omcipcap
            asset_name: omcipcap-win32.exe
          - os: macos-latest
            artifact_name: omcipcap_mac
            asset_name: omcipcap-macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install .

      - name: Build binary (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          pyinstaller --onefile --name ${{ matrix.artifact_name }} \
            --collect-all scapy \
            --collect-all rich \
            --collect-all omci \
            omci/cli.py

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          pyinstaller --onefile --name omcipcap `
            --collect-all scapy `
            --collect-all rich `
            --collect-all omci `
            omci/cli.py

      - name: Upload artifact (Linux/macOS)
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: omcipcap-exe
          path: dist/omcipcap.exe
  release:
    name: Create GitHub Release and Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/omcipcap_linux/omcipcap_linux
            artifacts/omcipcap-exe/omcipcap.exe
            artifacts/omcipcap_mac/omcipcap_mac
            dist/*.tar.gz
            dist/*.whl

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/*.tar.gz dist/*.whl
